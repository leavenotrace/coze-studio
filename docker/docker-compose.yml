name: coze-studio
x-env-file: &env_file
  - .env

services:
  # ========== 原有服务（省略不动） ==========
  mysql:
    image: mysql:8.4.5
    container_name: coze-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opencoze}
      MYSQL_USER: ${MYSQL_USER:-coze}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-coze123}
    env_file: *env_file
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./volumes/mysql/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - ./atlas/opencoze_latest_schema.hcl:/opencoze_latest_schema.hcl:ro
    networks:
      - coze-network

  redis:
    image: bitnamilegacy/redis:8.0
    container_name: coze-redis
    restart: always
    user: root
    privileged: true
    env_file: *env_file
    volumes:
      - ./data/bitnami/redis:/bitnami/redis/data:rw,Z
    networks:
      - coze-network

  elasticsearch:
    image: bitnamilegacy/elasticsearch:8.18.0
    container_name: coze-elasticsearch
    restart: always
    env_file: *env_file
    volumes:
      - ./data/bitnami/elasticsearch:/bitnami/elasticsearch/data
    networks:
      - coze-network

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z-cpuv1
    container_name: coze-minio
    restart: always
    env_file: *env_file
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_DEFAULT_BUCKETS: ${STORAGE_BUCKET:-opencoze},${MINIO_DEFAULT_BUCKETS:-milvus}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - coze-network

  etcd:
    image: bitnamilegacy/etcd:3.5
    container_name: coze-etcd
    restart: always
    env_file: *env_file
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    volumes:
      - ./data/bitnami/etcd:/bitnami/etcd:rw,Z
    networks:
      - coze-network

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: coze-milvus
    restart: always
    command: milvus run standalone
    env_file: *env_file
    environment:
      ETCD_ENDPOINTS: coze-etcd:2379
      MINIO_ADDRESS: coze-minio:9000
      MINIO_BUCKET_NAME: ${MINIO_DEFAULT_BUCKETS:-milvus}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_USE_SSL: false
    volumes:
      - ./data/milvus:/var/lib/milvus:rw,Z
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - coze-network

  nsqlookupd:
    image: nsqio/nsq:v1.2.1
    container_name: coze-nsqlookupd
    command: /nsqlookupd
    restart: always
    networks:
      - coze-network

  nsqd:
    image: nsqio/nsq:v1.2.1
    container_name: coze-nsqd
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160 --broadcast-address=nsqd
    restart: always
    depends_on:
      nsqlookupd:
        condition: service_started
    networks:
      - coze-network

  nsqadmin:
    image: nsqio/nsq:v1.2.1
    container_name: coze-nsqadmin
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    restart: always
    depends_on:
      nsqlookupd:
        condition: service_started
    networks:
      - coze-network

  coze-server:
    image: cozedev/coze-studio-server:latest
    container_name: coze-server
    restart: always
    env_file: *env_file
    volumes:
      - .env:/app/.env
      - ../backend/conf:/app/resources/conf
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      minio:
        condition: service_started
      milvus:
        condition: service_started
    networks:
      - coze-network

  # ========== 前端服务，注册到反向代理 ==========
  coze-web:
    image: cozedev/coze-studio-web:latest
    container_name: coze-web
    restart: always
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=coze.happygpts.cn
      - LETSENCRYPT_HOST=coze.happygpts.cn
      - LETSENCRYPT_EMAIL=bob@happyshare.io   # ← 换成你的邮箱
      - HTTPS_METHOD=noredirect  # 禁用 HTTPS 重定向
    depends_on:
      - coze-server
    networks:
      - coze-network
      - proxy-tier

  # ========== 自动 HTTPS 反向代理 ==========
  nginx-proxy:
    image: jwilder/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    networks:
      - proxy-tier
      - coze-network

  nginx-proxy-acme:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    environment:
      - DEFAULT_EMAIL=bob@happyshare.io
      - NGINX_PROXY_CONTAINER=nginx-proxy     # ✅ 关键行
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    depends_on:
      - nginx-proxy
    networks:
      - proxy-tier

networks:
  coze-network:
    driver: bridge
  proxy-tier:
    driver: bridge
